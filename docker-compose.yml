services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    hostname: dash-backend
    ports:
      - "127.0.0.1:${BACKEND_PUBLISHED_PORT:-8080}:8080"
    env_file: .env
    volumes:
      - data:/data
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    hostname: dash-frontend
    environment:
      FRONTEND_API_BASE_URL: ${FRONTEND_API_BASE_URL}
    ports: 
      - "127.0.0.1:${FRONTEND_PUBLISHED_PORT:-5173}:3000"
    depends_on: 
      - backend
volumes:
  data:

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    ports: 
      - "[::1]:8080:8080"
    volumes:
      - data:/data
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file: .env
    environment:
      BACKEND_INTERNAL_URL: http://backend:8080
      HOST: 0.0.0.0
      PORT: 3000
    ports: 
      - "[::1]:5173:3000"
    depends_on: 
      - backend
volumes:
  data:

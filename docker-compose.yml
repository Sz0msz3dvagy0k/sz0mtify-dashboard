services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    ports: ["8080:8080"]
    volumes:
      - data:/data
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file: .env
    ports: ["5173:5173"]
    depends_on: [backend]
volumes:
  data:

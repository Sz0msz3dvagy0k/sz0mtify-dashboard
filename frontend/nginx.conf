server {
	listen 3000;
	server_name _;
	root /usr/share/nginx/html;
	index index.html;

	gzip on;
	gzip_vary on;
	gzip_min_length 1024;
	gzip_comp_level 6;
	gzip_types
		application/javascript
		application/json
		application/wasm
		image/svg+xml
		text/css
		text/javascript
		text/plain;

	location /_app/immutable/ {
		try_files $uri =404;
		add_header Cache-Control "public, max-age=31536000, immutable";
	}

	location ~* \.(?:css|js|mjs|woff2?|otf|png|jpg|jpeg|gif|svg|webp|ico)$ {
		try_files $uri =404;
		add_header Cache-Control "public, max-age=31536000, immutable";
	}

	location / {
		try_files $uri $uri/ /index.html;
		add_header Cache-Control "no-cache";
	}
}
